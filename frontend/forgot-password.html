<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Hariram General Stores</title>
    <link rel="stylesheet" href="css/auth.css">
    <style>
        /* Ensuring perfect centering and spacing for the header area */
        .form-header {
            text-align: center;
            margin-bottom: 25px;
        }
        .svg-container { 
            display: flex;
            justify-content: center;
            margin-bottom: 15px; 
        }
        h2 {
            color: #ffffff;
            margin-bottom: 10px;
            font-size: 1.5rem;
        }
        #formSubtitle {
            color: #a1a1aa;
            font-size: 0.95rem;
            line-height: 1.4;
        }
        
        /* Captcha Box Spacing Fixes */
        .captcha-box { 
            margin: 20px 0; 
            text-align: left; 
            background-color: #1e1e2d;
            border: 1px solid #3a3a52;
            border-radius: 6px;
            padding: 15px;
        }
        .captcha-row { 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            margin-bottom: 10px; 
        }
        .captcha-error { 
            font-size: 13px; 
            color: #ef4444; 
            display: block; 
            margin-top: 5px; 
            min-height: 18px;
        }
        #refreshCaptcha { 
            cursor: pointer; 
            width: 48px;
            height: 48px;
            font-size: 20px; 
            border-radius: 4px; 
            border: 1px solid #3a3a52; 
            background: #2a2a3c; 
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #refreshCaptcha:hover {
            background-color: #3f3f5a;
        }
    </style>
</head>
<body>

<div class="wrapper">
  <div class="left-panel">
    <div class="overlay">
      <h1>HARIRAM GENERAL STORES</h1>
    </div>
  </div>

  <div class="right-panel">
    <div class="form-box">
      
      <div class="form-header">
          <div class="svg-container">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#9d2b8c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                  <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
              </svg>
          </div>
          <h2>Reset Your Password</h2>
          <p id="formSubtitle">Enter your mail id to receive a reset code</p>
      </div>

      <div id="requestTokenSection">
        <form id="requestTokenForm">
          <input type="text" id="identifier" placeholder="Enter Mail ID" required>
          
          <div class="captcha-box">
            <label class="captcha-label" style="font-size: 14px; color: #cbd5e1; display: block; margin-bottom: 8px;">Captcha</label>
            <div class="captcha-row">
              <canvas id="captchaCanvas" width="160" height="48" style="background: #ffffff; border-radius: 4px; flex: 1;"></canvas>
              <button type="button" id="refreshCaptcha" title="Refresh CAPTCHA">&#x21bb;</button>
            </div>
            <input type="text" id="captchaInput" placeholder="Enter characters above" autocomplete="off" autocapitalize="none" spellcheck="false" style="text-transform: none;" maxlength="6" required>
            <span id="captchaError" class="captcha-error"></span>
          </div>

          <button type="submit" class="primary-btn">Send Reset Code</button>
        </form>
      </div>

      <div id="resetPasswordSection" style="display: none;">
        <form id="resetPasswordForm">
          <input type="text" id="resetIdentifier" placeholder="Mail ID" readonly style="background-color: #2a2a3c; color: #a1a1aa; cursor: not-allowed; margin-bottom: 15px;">
          <input type="text" id="resetToken" placeholder="Reset Code (e.g. a1b2c3)" required>
          <input type="password" id="newPassword" placeholder="New Password" required>
          <div id="passwordStrength" class="strength-meter"></div>
          <input type="password" id="confirmPassword" placeholder="Confirm New Password" required>
          
          <button type="submit" class="primary-btn">Reset Password</button>
        </form>
      </div>

      <p class="bottom-text" style="margin-top: 25px;">
        Remember your password? <a href="login.html">Back to Login</a>
      </p>

    </div>
  </div>
</div>

<script src="js/forgot-password.js"></script>
</body>
</html>
