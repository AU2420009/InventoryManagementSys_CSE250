<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
body{font-family:Inter;background:#f9fafb;margin:0;}
.navbar{display:flex;justify-content:space-between;padding:1rem 2rem;background:#fff;border-bottom:1px solid #e5e7eb;}
.nav-links{display:flex;gap:2rem;}
.nav-item{color:#4b5563;text-decoration:none;}
.nav-item.active{color:#2563eb;border-bottom:2px solid #2563eb;}
.main-content{padding:2rem;max-width:1200px;margin:auto;}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem;}
.card{background:#fff;padding:1.5rem;border:1px solid #e5e7eb;border-radius:8px;}
</style>
</head>

<body>

<nav class="navbar">
<div>Hariram General Stores</div>
<div class="nav-links">
<a href="dashboard.html" class="nav-item active">Dashboard</a>
<a href="products.html" class="nav-item">Products</a>
<a href="orders.html" class="nav-item">Orders</a>
<a href="customers.html" class="nav-item">Customers</a>
</div>
<button onclick="logout()">Logout</button>
</nav>

<main class="main-content">
<h1>Admin Dashboard</h1>

<div class="stats">
<div class="card">Products: <span id="p">0</span></div>
<div class="card">Orders: <span id="o">0</span></div>
<div class="card">Customers: <span id="c">0</span></div>
</div>
</main>

<script>
function checkAuth(){ if(localStorage.getItem('role')!=='admin') location='../login.html'; }
function logout(){ localStorage.clear(); location='../login.html'; }

async function load(){
const [p,o,c]=await Promise.all([
fetch('http://localhost:5000/products'),
fetch('http://localhost:5000/orders'),
fetch('http://localhost:5000/customers')
]);

document.getElementById('p').textContent=(await p.json()).length;
document.getElementById('o').textContent=(await o.json()).length;
document.getElementById('c').textContent=(await c.json()).length;
}

checkAuth(); load();
</script>

</body>
</html>
