<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Hariram General Stores</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f9fafb;
            margin: 0;
            padding: 0;
            color: #1f2937;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #ffffff;
            padding: 0 2rem;
            height: 64px;
            border-bottom: 1px solid #e5e7eb;
        }

        .navbar-brand {
            font-size: 1.25rem;
            font-weight: 700;
            color: #111827;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            height: 100%;
        }

        .nav-item {
            text-decoration: none;
            color: #4b5563;
            font-size: 0.9rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }

        .nav-item.active {
            color: #2563eb;
            border-bottom: 2px solid #2563eb;
        }

        .nav-item:hover {
            color: #111827;
        }

        .logout-btn {
            background-color: transparent;
            border: 1px solid #d1d5db;
            padding: 0.4rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            color: #dc2626;
        }

        .main-content {
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background-color: #ffffff;
            padding: 1.5rem;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
            border-left: 4px solid;
        }

        .card-blue { border-left-color: #3b82f6; }
        .card-yellow { border-left-color: #f59e0b; }
        .card-green { border-left-color: #10b981; }
        .card-purple { border-left-color: #8b5cf6; }

        .stat-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #6b7280;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 0.8rem;
            border-bottom: 1px solid #eee;
        }
    </style>
</head>

<body>

<nav class="navbar">
    <div class="navbar-brand">Hariram General Stores</div>

    <div class="nav-links">
        <a href="dashboard.html" class="nav-item active">Dashboard</a>
        <a href="products.html" class="nav-item">Products</a>
        <a href="orders.html" class="nav-item">Orders</a>
        <a href="customers.html" class="nav-item">Customers</a>
    </div>

    <button id="logoutBtn" class="logout-btn">Logout</button>
</nav>

<main class="main-content">

    <h1>Admin Dashboard</h1>

    <div class="stats-grid">
        <div class="stat-card card-blue">
            <div class="stat-title">Total Products</div>
            <div class="stat-value" id="products">0</div>
        </div>
        <div class="stat-card card-yellow">
            <div class="stat-title">Total Orders</div>
            <div class="stat-value" id="orders">0</div>
        </div>
        <div class="stat-card card-green">
            <div class="stat-title">Total Customers</div>
            <div class="stat-value" id="customers">0</div>
        </div>
        <div class="stat-card card-purple">
            <div class="stat-title">Pending Orders</div>
            <div class="stat-value" id="pending">0</div>
        </div>
    </div>

</main>

<script>
function checkAuth() {
    if (localStorage.getItem('role') !== 'admin') {
        window.location.href = '../login.html';
    }
}

function logout() {
    localStorage.clear();
    window.location.href = '../login.html';
}

async function loadDashboard() {
    try {
        const [productsRes, ordersRes, customersRes] = await Promise.all([
            fetch('http://localhost:5000/products'),
            fetch('http://localhost:5000/orders'),
            fetch('http://localhost:5000/customers')
        ]);

        const products = await productsRes.json();
        const orders = await ordersRes.json();
        const customers = await customersRes.json();

        document.getElementById('products').textContent = products.length;
        document.getElementById('orders').textContent = orders.length;
        document.getElementById('customers').textContent = customers.length;

        const pendingOrders = orders.filter(order => (order.Status ?? order.status ?? order.STATUS) === 'Processing').length;
        document.getElementById('pending').textContent = pendingOrders;
    } catch (error) {
        console.error('Error loading dashboard data:', error);
    }
}

document.getElementById('logoutBtn').addEventListener('click', logout);

checkAuth();
loadDashboard();
</script>

</body>
</html>
