<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Hariram General Stores</title>
<link rel="stylesheet" href="css/auth.css">
</head>
<body>

<div class="wrapper">

  <div class="left-panel">
    <div class="overlay">
      <h1>HARIRAM GENERAL STORES</h1>
    </div>
  </div>

  <div class="right-panel">
    <div class="form-box">
      <img src="css/Logo1.avif" alt="Logo" class="auth-logo" onerror="this.style.display='none'">
      
      <h2 id="formTitle">HARIRAM GENERAL STORES</h2>

      <form id="loginForm">
        <input type="text" id="loginIdentifier" placeholder="Username or Email" required>
        <input type="password" id="loginPassword" placeholder="Password" required>

        <div class="captcha-box">
          <label class="captcha-label">Captcha</label>
          <div class="captcha-row">
            <canvas id="captchaCanvas" width="160" height="48"></canvas>
            <button type="button" id="refreshCaptcha" title="Refresh CAPTCHA">
               <svg viewBox="0 0 24 24" width="16" height="16" fill="white"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"></path></svg>
            </button>
          </div>
          <input type="text" id="captchaInput" placeholder="Enter characters above" autocomplete="off" maxlength="6" required>
          <span id="captchaError" class="captcha-error"></span>
        </div>

        <button type="submit" class="primary-btn">Login</button>

        <div class="forgot-password-section" id="forgotPasswordDiv">
          <a href="forgot-password.html">Forgot password?</a>
        </div>

        <p class="bottom-text">
          Don't have an account? <a href="#">Contact Store</a>
        </p>
      </form>

      <form id="twoFactorForm" style="display: none;">
        <p class="two-factor-subtitle">A 6-digit verification code has been sent to your email.</p>
        
        <input type="text" id="twoFactorCode" placeholder="123456" maxlength="6" required autocomplete="off">
        <p id="twoFactorError" class="error-msg"></p>
        
        <button type="submit" id="verifyBtn" class="primary-btn">Verify & Login</button>
        <button type="button" id="backToLoginBtn" class="secondary-btn">Back to Login</button>
      </form>

    </div>
  </div>

</div>

<script src="js/auth.js"></script>
</body>
</html>
