<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Products</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

body { font-family: 'Inter'; background:#f9fafb; margin:0; }

.navbar {
display:flex; justify-content:space-between; align-items:center;
background:#fff; padding:0 2rem; height:64px; border-bottom:1px solid #e5e7eb;
}

.nav-links { display:flex; gap:2rem; height:100%; }

.nav-item {
text-decoration:none; color:#4b5563; display:flex; align-items:center;
border-bottom:2px solid transparent;
}

.nav-item.active { color:#2563eb; border-bottom:2px solid #2563eb; }

.logout-btn {
border:1px solid #d1d5db; padding:0.4rem 1rem;
border-radius:6px; cursor:pointer; color:#dc2626;
}

.main-content { padding:2rem; max-width:1200px; margin:auto; }

table { width:100%; border-collapse:collapse; }

th,td { padding:0.8rem; border-bottom:1px solid #eee; }
</style>
</head>

<body>

<nav class="navbar">
<div>Hariram General Stores</div>
<div class="nav-links">
<a href="dashboard.html" class="nav-item">Dashboard</a>
<a href="products.html" class="nav-item active">Products</a>
<a href="orders.html" class="nav-item">Orders</a>
<a href="customers.html" class="nav-item">Customers</a>
</div>
<button class="logout-btn" onclick="logout()">Logout</button>
</nav>

<main class="main-content">

<h1>Products</h1>

<table>
<thead>
<tr><th>ID</th><th>Name</th><th>Qty</th><th>Price</th><th>Action</th></tr>
</thead>
<tbody id="t"></tbody>
</table>

</main>

<script>
function checkAuth(){
if(localStorage.getItem('role')!=='staff'){
window.location.href='../login.html';
}
}

function logout(){
localStorage.clear();
window.location.href='../login.html';
}

async function load(){
const res=await fetch('http://localhost:5000/products');
const data=await res.json();

const t=document.getElementById('t');
t.innerHTML='';

data.forEach(p=>{
t.innerHTML+=`
<tr>
<td>${p.id}</td>
<td>${p.name}</td>
<td>${p.quantity}</td>
<td>${p.price}</td>
<td><button onclick="del(${p.id})">Delete</button></td>
</tr>`;
});
}

async function del(id){
await fetch(`http://localhost:5000/products/${id}`,{method:'DELETE'});
load();
}

checkAuth();
load();
</script>

</body>
</html>
