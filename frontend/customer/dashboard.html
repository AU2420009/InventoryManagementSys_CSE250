<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Dashboard - Hariram General Stores</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f9fafb;
            margin: 0;
            padding: 0;
            color: #1f2937;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #ffffff;
            padding: 0 2rem;
            height: 64px;
            border-bottom: 1px solid #e5e7eb;
        }

        .navbar-brand {
            font-size: 1.25rem;
            font-weight: 700;
            color: #111827;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            height: 100%;
        }

        .nav-item {
            text-decoration: none;
            color: #4b5563;
            font-size: 0.9rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }

        .nav-item.active {
            color: #2563eb;
            border-bottom: 2px solid #2563eb;
        }

        .nav-item:hover {
            color: #111827;
        }

        .logout-btn {
            background-color: transparent;
            border: 1px solid #d1d5db;
            padding: 0.4rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            color: #dc2626;
        }

        .main-content {
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background-color: #ffffff;
            padding: 1.5rem;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
            border-left: 4px solid;
        }

        .card-blue { border-left-color: #3b82f6; }
        .card-yellow { border-left-color: #f59e0b; }
        .card-green { border-left-color: #10b981; }
        .card-purple { border-left-color: #8b5cf6; }

        .stat-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #6b7280;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 0.8rem;
            border-bottom: 1px solid #eee;
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="navbar-brand">Hariram General Stores</div>

    <div class="nav-links">
        <a href="dashboard.html" class="nav-item active">Dashboard</a>
        <a href="orders.html" class="nav-item">My Orders</a>
        <a href="place-order.html" class="nav-item">Place Order</a>
    </div>

    <button id="logoutBtn" class="logout-btn">Logout</button>
</nav>

<main class="main-content">

    <h1>Customer Dashboard</h1>

    <div class="stats-grid">
        <div class="stat-card card-blue">
            <div class="stat-title">Total Orders</div>
            <div class="stat-value" id="totalOrders">0</div>
        </div>
        <div class="stat-card card-yellow">
            <div class="stat-title">Pending</div>
            <div class="stat-value" id="pendingOrders">0</div>
        </div>
        <div class="stat-card card-green">
            <div class="stat-title">Completed</div>
            <div class="stat-value" id="completedOrders">0</div>
        </div>
    </div>

    <h3>Recent Orders</h3>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Product</th>
                <th>Qty</th>
                <th>Price</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="ordersTable"></tbody>
    </table>

</main>

<script>
function checkAuth() {
    const role = localStorage.getItem('role');
    if (role !== 'customer') {
        window.location.href = '../login.html';
    }
}

function logout() {
    localStorage.clear();
    window.location.href = '../login.html';
}

async function loadDashboard() {
    // Get customer ID from session (you'll need to implement this)
    const customerId = localStorage.getItem('customerId') || 1; // Fallback for testing
    
    const res = await fetch(`http://localhost:5000/orders/customer/${customerId}`, {
        headers: {
            'Authorization': 'Bearer ' + localStorage.getItem('sessionId')
        }
    });

    const orders = await res.json();

    let total = orders.length;
    let pending = orders.filter(o => o.Status === 'Processing').length;
    let completed = orders.filter(o => o.Status === 'Completed').length;

    document.getElementById('totalOrders').textContent = total;
    document.getElementById('pendingOrders').textContent = pending;
    document.getElementById('completedOrders').textContent = completed;

    const table = document.getElementById('ordersTable');
    table.innerHTML = '';

    // Flatten orders with items for display
    let flatOrders = [];
    orders.forEach(order => {
        if (order.items && order.items.length > 0) {
            order.items.forEach(item => {
                flatOrders.push({
                    Order_ID: order.Order_ID,
                    Product_Name: item.Name,
                    Quantity: item.Quantity_Ordered,
                    Price: item.Price_At_Order_Time,
                    Status: order.Status
                });
            });
        } else {
            // Show order even if no items
            flatOrders.push({
                Order_ID: order.Order_ID,
                Product_Name: 'No items',
                Quantity: 0,
                Price: 0,
                Status: order.Status
            });
        }
    });

    flatOrders.slice(0, 5).forEach(o => {
        table.innerHTML += `
        <tr>
            <td>${o.Order_ID}</td>
            <td>${o.Product_Name}</td>
            <td>${o.Quantity}</td>
            <td>Rs ${o.Price}</td>
            <td>${o.Status}</td>
        </tr>`;
    });
}

document.getElementById('logoutBtn').addEventListener('click', logout);

checkAuth();
loadDashboard();
</script>

</body>
</html>
