<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders - Hariram General Stores</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f9fafb;
            margin: 0;
            padding: 0;
            color: #1f2937;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #ffffff;
            padding: 0 2rem;
            height: 64px;
            border-bottom: 1px solid #e5e7eb;
        }

        .navbar-brand {
            font-size: 1.25rem;
            font-weight: 700;
            color: #111827;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            height: 100%;
        }

        .nav-item {
            text-decoration: none;
            color: #4b5563;
            font-size: 0.9rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }

        .nav-item.active {
            color: #2563eb;
            border-bottom: 2px solid #2563eb;
        }

        .nav-item:hover {
            color: #111827;
        }

        .logout-btn {
            background-color: transparent;
            border: 1px solid #d1d5db;
            padding: 0.4rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            color: #dc2626;
        }

        .main-content {
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 0.8rem;
            border-bottom: 1px solid #eee;
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="navbar-brand">Hariram General Stores</div>

    <div class="nav-links">
        <a href="dashboard.html" class="nav-item">Dashboard</a>
        <a href="orders.html" class="nav-item active">My Orders</a>
        <a href="place-order.html" class="nav-item">Place Order</a>
    </div>

    <button id="logoutBtn" class="logout-btn">Logout</button>
</nav>

<main class="main-content">

    <h1>My Orders</h1>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Product</th>
                <th>Quantity</th>
                <th>Price</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="ordersTable"></tbody>
    </table>

</main>

<script>
function checkAuth() {
    const role = localStorage.getItem('role');
    if (role !== 'customer') {
        window.location.href = '../login.html';
    }
}

function logout() {
    localStorage.clear();
    window.location.href = '../login.html';
}

async function loadOrders() {
    try {
        // Get customer ID from session (you'll need to implement this)
        const customerId = localStorage.getItem('customerId') || 1; // Fallback for testing
        
        const res = await fetch(`http://localhost:5000/orders/customer/${customerId}`, {
            headers: {
                'Authorization': 'Bearer ' + localStorage.getItem('sessionId')
            }
        });

        if (!res.ok) {
            throw new Error('Failed to load orders');
        }

        const orders = await res.json();
        const table = document.getElementById('ordersTable');
        table.innerHTML = '';

        if (orders.length === 0) {
            table.innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 2rem;">No orders found</td></tr>';
            return;
        }

        // Display orders with their items
        orders.forEach(order => {
            if (order.items && order.items.length > 0) {
                order.items.forEach((item, index) => {
                    table.innerHTML += `
                    <tr>
                        <td>${order.Order_ID}${index > 0 ? '' : ''}</td>
                        <td>${item.Name}</td>
                        <td>${item.Quantity_Ordered}</td>
                        <td>Rs ${item.Price_At_Order_Time}</td>
                        <td>${order.Status}</td>
                    </tr>`;
                });
            } else {
                table.innerHTML += `
                <tr>
                    <td>${order.Order_ID}</td>
                    <td>No items</td>
                    <td>0</td>
                    <td>Rs 0</td>
                    <td>${order.Status}</td>
                </tr>`;
            }
        });
    } catch (error) {
        console.error('Error loading orders:', error);
        document.getElementById('ordersTable').innerHTML = 
            '<tr><td colspan="5" style="text-align: center; color: red;">Error loading orders. Please try again.</td></tr>';
    }
}

document.getElementById('logoutBtn').addEventListener('click', logout);

checkAuth();
loadOrders();
</script>

</body>
</html>
